<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Smart Digital Card</title>
  <!-- 프리미엄 폰트 (Inter & 폰트어썸) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 배경 이펙트 (영롱한 빛) -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <!-- 앱 컨테이너 -->
  <div class="app-container">
    
    <!-- 탭 1: 내 명함 (My Card) -->
    <section id="tab-mycard" class="tab-content active">
      <div class="glass-card my-profile">
        <div class="profile-img-box">
          <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=256&q=80" alt="프로필" class="profile-img">
        </div>
        <h1 class="profile-name">홍길동</h1>
        <p class="profile-title">UX/UI Designer & Developer</p>
        <p class="profile-bio">"사용자의 마음을 움직이는 디자인을 합니다."</p>
        
        <div class="social-links">
          <a href="#" class="social-btn"><i class="fab fa-instagram"></i></a>
          <a href="#" class="social-btn"><i class="fab fa-github"></i></a>
          <a href="#" class="social-btn"><i class="fas fa-envelope"></i></a>
          <a href="#" class="social-btn"><i class="fas fa-link"></i></a>
        </div>
      </div>
    </section>

    <!-- 탭 2: 명함 스캐너 -->
    <section id="tab-scanner" class="tab-content hidden">
      <div class="glass-card scanner-box">
        <h2><i class="fas fa-camera"></i> 명함 스캔하기</h2>
        <p>명함 사진을 찍거나 갤러리에서 선택하세요.</p>
        
        <!-- 카메라/파일 입력 -->
        <label for="camera-input" class="custom-file-upload">
          <i class="fas fa-upload"></i> 사진 촬영 / 업로드
        </label>
        <input type="file" id="camera-input" accept="image/*" capture="environment" />
        
        <!-- 미리보기 및 스캔 상태 -->
        <div class="img-preview-box">
          <img id="image-preview" src="" alt="미리보기" style="display:none;">
          <div id="scan-status" class="scan-status" style="display:none;">
            <i class="fas fa-spinner fa-spin"></i> 마법처럼 글자를 읽는 중...
          </div>
        </div>

        <!-- 스캔된 결과 수정 폼 -->
        <div id="result-form" class="result-form hidden">
          <div class="input-group">
            <label>이름 / 회사</label>
            <input type="text" id="result-name" placeholder="인식된 이름">
          </div>
          <div class="input-group">
            <label>연락처</label>
            <input type="text" id="result-phone" placeholder="인식된 전화번호">
          </div>
          <div class="input-group">
            <label>기타(이메일 등)</label>
            <textarea id="result-extra" rows="3" placeholder="추출된 텍스트 전체 수정 가능"></textarea>
          </div>
          <button id="save-card-btn" class="primary-btn"><i class="fas fa-save"></i> 명함첩에 저장</button>
        </div>
      </div>
    </section>

    <!-- 탭 3: 내 명함첩 -->
    <section id="tab-contacts" class="tab-content hidden">
      <div class="contacts-header">
        <h2><i class="fas fa-address-book"></i> 내 명함첩</h2>
      </div>
      <div id="contacts-list" class="contacts-list">
        <!-- 저장된 명함들이 여기에 JavaScript로 추가됩니다 -->
        <div class="empty-state">
          저장된 명함이 없습니다. 스캐너로 명함을 추가해보세요!
        </div>
      </div>
    </section>

  </div>

  <!-- 하단 네비게이션 바 -->
  <nav class="bottom-nav glass-nav">
    <button class="nav-btn active" data-target="tab-mycard">
      <i class="fas fa-id-badge"></i>
      <span>내 명함</span>
    </button>
    <button class="nav-btn scanner-btn" data-target="tab-scanner">
      <div class="scan-icon-wrapper">
        <i class="fas fa-expand"></i>
      </div>
      <span>스캔</span>
    </button>
    <button class="nav-btn" data-target="tab-contacts">
      <i class="fas fa-inbox"></i>
      <span>명함첩</span>
    </button>
  </nav>

  <!-- Tesseract.js (광학 문자 인식 AI) -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
