<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Smart Digital Card</title>
  <!-- 프리미엄 폰트 -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <div class="app-container">
    
    <!-- 탭 1: 내 명함 (My Card) -->
    <section id="tab-mycard" class="tab-content active">
      <div class="glass-card my-profile">
        <div class="profile-img-box">
          <img id="my-profile-img" src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=256&q=80" alt="프로필" class="profile-img">
        </div>
        <h1 id="my-profile-name" class="profile-name">홍길동</h1>
        <p id="my-profile-title" class="profile-title">UX/UI Designer & Developer</p>
        <p id="my-profile-bio" class="profile-bio">"사용자의 마음을 움직이는 디자인을 합니다."</p>
        
        <div class="social-links">
          <a href="#" class="social-btn"><i class="fab fa-instagram"></i></a>
          <a href="#" class="social-btn"><i class="fab fa-github"></i></a>
          <a href="#" class="social-btn"><i class="fas fa-envelope"></i></a>
        </div>

        <!-- 액션 버튼들 -->
        <div class="my-actions">
          <button id="btn-edit-profile" class="action-btn outline-btn">
            <i class="fas fa-pencil-alt"></i> 내 정보 수정
          </button>
          <button id="btn-show-qr" class="action-btn primary-btn">
            <i class="fas fa-qrcode"></i> 명함 QR 보여주기
          </button>
        </div>
      </div>
    </section>

    <!-- 탭 2: 명함 스캐너 -->
    <section id="tab-scanner" class="tab-content hidden">
      <div class="glass-card scanner-box">
        <h2><i class="fas fa-camera"></i> 명함 스캔하기</h2>
        <p>명함 사진을 찍거나 갤러리에서 선택하세요.</p>
        
        <label for="camera-input" class="custom-file-upload">
          <i class="fas fa-upload"></i> 사진 촬영 / 업로드
        </label>
        <input type="file" id="camera-input" accept="image/*" capture="environment" />
        
        <div class="img-preview-box">
          <img id="image-preview" src="" alt="미리보기" style="display:none;">
          <div id="scan-status" class="scan-status" style="display:none;">
            <i class="fas fa-spinner fa-spin"></i> 글자 읽는 중...
          </div>
        </div>

        <div id="result-form" class="result-form hidden">
          <div class="input-group">
            <label>이름 / 회사</label>
            <input type="text" id="result-name" placeholder="인식된 이름">
          </div>
          <div class="input-group">
            <label>연락처</label>
            <input type="text" id="result-phone" placeholder="인식된 전화번호">
          </div>
          <div class="input-group">
            <label>기타</label>
            <textarea id="result-extra" rows="3" placeholder="수정 가능"></textarea>
          </div>
          <button id="save-card-btn" class="primary-btn"><i class="fas fa-save"></i> 명함첩에 저장</button>
        </div>
      </div>
    </section>

    <!-- 탭 3: 내 명함첩 -->
    <section id="tab-contacts" class="tab-content hidden">
      <div class="contacts-header">
        <h2><i class="fas fa-address-book"></i> 내 명함첩</h2>
      </div>
      <div id="contacts-list" class="contacts-list"></div>
    </section>

  </div>

  <!-- 하단 네비게이션 -->
  <nav class="bottom-nav glass-nav">
    <button class="nav-btn active" data-target="tab-mycard">
      <i class="fas fa-id-badge"></i><span>내 명함</span>
    </button>
    <button class="nav-btn scanner-btn" data-target="tab-scanner">
      <div class="scan-icon-wrapper"><i class="fas fa-expand"></i></div>
      <span>스캔</span>
    </button>
    <button class="nav-btn" data-target="tab-contacts">
      <i class="fas fa-inbox"></i><span>명함첩</span>
    </button>
  </nav>

  <!-- 프로필 수정 모달창 -->
  <div id="edit-modal" class="modal-overlay hidden">
    <div class="modal-content glass-card">
      <h3>프로필 수정</h3>
      <div class="input-group">
        <label>이름 / 닉네임</label>
        <input type="text" id="edit-name">
      </div>
      <div class="input-group">
        <label>직업 / 소속</label>
        <input type="text" id="edit-title">
      </div>
      <div class="input-group">
        <label>한 줄 소개</label>
        <textarea id="edit-bio" rows="2"></textarea>
      </div>
      <div class="modal-buttons">
        <button id="btn-cancel-edit" class="action-btn outline-btn">취소</button>
        <button id="btn-save-edit" class="action-btn primary-btn">저장</button>
      </div>
    </div>
  </div>

  <!-- QR 코드 모달창 -->
  <div id="qr-modal" class="modal-overlay hidden">
    <div class="modal-content glass-card">
      <h3>내 명함 전달하기</h3>
      <p style="color:var(--text-secondary); font-size:0.9rem; margin-bottom:20px;">이 코드를 스캔하면 브라우저로 연결됩니다.</p>
      
      <div class="qr-box">
        <div id="qrcode"></div>
        <div class="qr-loader" id="qr-loader"><i class="fas fa-spinner fa-spin"></i> QR 생성 중...</div>
      </div>
      
      <button id="btn-close-qr" class="action-btn primary-btn" style="margin-top:20px; width:100%;">닫기</button>
    </div>
  </div>

  <!-- 타인 명함(고객 정보) 수정 모달창 -->
  <div id="edit-contact-modal" class="modal-overlay hidden">
    <div class="modal-content glass-card">
      <h3>고객 정보 수정</h3>
      <div class="input-group">
         <label>이름 / 회사</label>
         <input type="text" id="edit-contact-name">
      </div>
      <div class="input-group">
         <label>연락처</label>
         <input type="text" id="edit-contact-phone">
      </div>
      <div class="input-group">
         <label>기타</label>
         <textarea id="edit-contact-extra" rows="2"></textarea>
      </div>
      <div class="modal-buttons">
         <button id="btn-cancel-contact-edit" class="action-btn outline-btn">취소</button>
         <button id="btn-save-contact-edit" class="action-btn primary-btn">저장</button>
      </div>
    </div>
  </div>

  <!-- 라이브러리들 -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
  <!-- QR 코드 웹 라이브러리 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
